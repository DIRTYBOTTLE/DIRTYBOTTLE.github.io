<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIRTYBOTTLE的个人博客</title>
    <style>
        /* 全局样式 */
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }

        /* 头部导航 */
        header {
            background: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .container { width: 90%; max-width: 960px; margin: 0 auto; }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        nav .logo {
            font-size: 1.5em;
            font-weight: bold;
        }
        nav ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }
        nav ul li {
            margin-left: 20px;
        }

        /* 主要内容区域 */
        main {
            padding: 100px 0 50px; /* 留出头部空间 */
            background: #fff;
        }
        .post-list {
            list-style: none;
            padding: 0;
        }
        .post-item {
            padding: 20px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .post-item h2 {
            margin: 0 0 10px;
        }
        .post-item p {
            margin: 0;
            color: #555;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 20px 0;
            background: #ffffff;
            border-top: 1px solid #e0e0e0;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            nav ul li { margin-left: 10px; }
            .container { width: 95%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">DIRTYBOTTLE博客</div>
                <ul>
                    <li><a href="#">首页</a></li>
                    <li><a href="#about">关于</a></li>
                    <li><a href="#contact">联系</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- 在头部加入 markdown 解析库 -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <section class="intro">
            <h1>欢迎来到DIRTYBOTTLE的个人博客</h1>
            <p>这里记录我的想法、项目和生活点滴。</p>
        </section>

        <section class="posts">
            <h2>最新文章</h2>
            <ul class="post-list" id="post-list">
                <!-- 动态加载文章列表 -->
            </ul>
        </section>
        <section class="article-content" id="article-content" style="display:none; padding-top:50px;">
            <!-- 点击文章后展示内容 -->
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 DIRTYBOTTLE. All rights reserved.</p>
            <p><a href="#">隐私政策</a> | <a href="#">免责声明</a></p>
        </div>
    </footer>

    <script>
        // 读取文章列表并生成预览
        async function loadPosts() {
            try {
                const res = await fetch('articles/articles.json');
                const posts = await res.json();
                const listEl = document.getElementById('post-list');
                posts.forEach(post => {
                    const li = document.createElement('li');
                    li.className = 'post-item';
                    li.innerHTML = `<h2><a href="#" data-file="${post.filename}">${post.title}</a></h2>
                                    <p>${post.summary}</p>`;
                    listEl.appendChild(li);
                });
                // attach click handlers
                document.querySelectorAll('#post-list a').forEach(a => {
                    a.addEventListener('click', async e => {
                        e.preventDefault();
                        const file = e.target.dataset.file;
                        const md = await fetch('articles/' + file).then(r=>r.text());
                        document.getElementById('article-content').style.display = 'block';
                        document.getElementById('article-content').innerHTML = marked.parse(md);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
                });
            } catch (err) {
                console.error('加载文章列表失败', err);
            }
        }
        loadPosts();
    </script>
</body>
</html>
